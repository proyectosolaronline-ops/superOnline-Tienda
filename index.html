<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Core Logística Tienda</title>
    <style>
        :root { --warn: #ff6600; --text: #333; }
        body { font-family: 'Outfit', sans-serif; }
        #grid-el { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .pcard { border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        .price-real { font-size: 16px; font-weight: 700; display: block; }
        .price-wholesale { color: var(--warn); font-size: 12px; font-weight: 800; }
        #loading-overlay { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 99; }
    </style>
</head>
<body>

<div id="loading-overlay">Cargando Tienda...</div>
<div id="grid-el"></div>

<script>
// --- LOGÍSTICA DE ORIGEN (Parámetros URL) ---
const params = new URLSearchParams(window.location.search);
const BACKEND = params.get('backend'); // Tu Apps Script URL
const STORE_ID = params.get('store');   // Tu store_id de la hoja

// --- VARIABLES DE ESTADO ---
let products = [];
let customer = null; // Se llenará con el fetch o login

// --- MOTOR DE FORMATEO ---
function fmt(n) { return '$' + Number(n || 0).toLocaleString(); }

// --- LOGÍSTICA DE RENDERIZADO (El Corazón del Fix) ---
function renderGridPage() {
    const g = document.getElementById('grid-el');
    const isM = (customer && customer.isMayorista === true);
    
    if (!products.length) {
        g.innerHTML = "No hay productos.";
        return;
    }

    // Clon de tu lógica .map().join('')
    const html = products.map(function(p) {
        // Logística: Price 2 es Mayoreo, Price es Público
        const p1 = p.price;
        const p2 = p.price2;

        let priceHTML = '<div class="price-wrap">';
        if (isM && p2 && p2 != 0) {
            // Si es mayorista, inyectamos SOLO el precio 2 en naranja
            priceHTML += '<span class="price-real" style="color:var(--warn)">' + fmt(p2) + '</span>';
            priceHTML += '<span class="price-wholesale">★ MAYOREO</span>';
        } else {
            // Si es público, inyectamos SOLO el precio 1
            priceHTML += '<span class="price-real">' + fmt(p1) + '</span>';
        }
        priceHTML += '</div>';

        return '<div class="pcard">' +
                 '<div>' + p.name + '</div>' +
                 priceHTML + 
               '</div>';
    }).join('');

    g.innerHTML = html;
    // Rompemos el loop de carga apagando el overlay aquí
    document.getElementById('loading-overlay').style.display = 'none';
}

// --- LOGÍSTICA ASÍNCRONA (Fetch Real) ---
async function init() {
    if (!BACKEND || !STORE_ID) {
        document.body.innerHTML = "Error: Parámetros faltantes.";
        return;
    }

    try {
        // Simulamos la llamada a tu Google Apps Script
        const response = await fetch(`${BACKEND}?action=getStoreData&storeId=${STORE_ID}`);
        const data = await response.json();
        
        products = data.products || [];
        customer = data.customer || { isMayorista: true }; // Simulamos sesión activa

        renderGridPage();
    } catch (e) {
        console.error("Error de conexión:", e);
        // Incluso si falla, apagamos el loop para mostrar el error
        document.getElementById('loading-overlay').innerHTML = "Error de conexión con el Backend.";
    }
}

// Iniciar aplicación
window.onload = init;
</script>
</body>
</html>
