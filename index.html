<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" id="pwa-apple-title" content="Tienda">
<meta name="theme-color" id="pwa-theme-color" content="#1a73e8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" id="pwa-apple-icon" href="">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;--primary-mid:#4285f4;
  --cta:#ff6900;--cta-dark:#e55c00;--cta-light:#fff3ed;
  --success:#00a650;--success-light:#e6f7ee;
  --warn:#f59e0b;--warn-light:#fffbeb;
  --danger:#d93025;
  --bg:#f5f6f7;--surface:#fff;--surface2:#f8f9fa;--border:#dde1e7;--border-light:#eef0f3;
  --text:#1a1a2e;--text-mid:#4a4a5a;--muted:#717185;--muted-light:#b0b3c1;
  --font-d:'Outfit',sans-serif;--font-b:'Inter',sans-serif;
  --r:8px;--r-lg:12px;--r-xl:16px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 28px rgba(0,0,0,.12);
  --shadow-xl:0 20px 60px rgba(0,0,0,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:14px}
.navbar{background:#fff;border-bottom:1px solid var(--border);padding:0 max(16px,calc((100vw - 1200px)/2));height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;transition:box-shadow .2s}
.navbar.scrolled{box-shadow:var(--shadow)}
.brand{font-family:var(--font-d);font-size:20px;font-weight:800;color:var(--primary);cursor:pointer;user-select:none;display:flex;align-items:center;gap:8px;position:relative;letter-spacing:-.02em}
.brand-icon{width:32px;height:32px;border-radius:8px;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s}
.brand:hover .brand-icon{transform:scale(1.08)}
.brand-icon svg{width:18px;height:18px}
.tap-ring{position:absolute;inset:-4px;border-radius:10px;border:2px solid var(--primary);opacity:0;pointer-events:none;transition:opacity .2s}
.brand.tapping .tap-ring{opacity:1}
.tap-count{position:absolute;top:-8px;right:-8px;background:var(--cta);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center}
.brand.tapping .tap-count{display:flex}
.nav-right{display:flex;align-items:center;gap:6px;position:relative}
.nav-user{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text-mid);padding:6px 12px;border-radius:var(--r);background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.nav-user:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.nav-avatar{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.cart-pill{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);background:var(--cta);color:#fff;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-b);transition:all .2s;box-shadow:0 2px 8px rgba(255,105,0,.3)}
.cart-pill:hover{background:var(--cta-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,105,0,.4)}
.cart-pill .n{background:rgba(255,255,255,.25);border-radius:99px;padding:1px 7px;font-size:11px;font-weight:700;min-width:20px;text-align:center}
.wa-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:var(--r);background:#f0fdf4;color:#15803d;font-size:12px;font-weight:600;border:1px solid #bbf7d0;cursor:pointer;font-family:var(--font-b);transition:all .15s}
.wa-btn:hover{background:#dcfce7;border-color:#86efac}
.mayorista-badge{display:inline-flex;align-items:center;gap:4px;background:#fff7e6;border:1px solid #ffd591;color:#d46b08;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px}
.hero{padding:10px max(16px,calc((100vw - 1200px)/2)) 10px;background:var(--primary);color:#fff;position:relative;overflow:hidden;min-height:95px;max-height:200px;display:flex;align-items:center}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.045'%3E%3Ccircle cx='40' cy='40' r='2'/%3E%3Ccircle cx='0' cy='0' r='2'/%3E%3Ccircle cx='80' cy='0' r='2'/%3E%3Ccircle cx='0' cy='80' r='2'/%3E%3Ccircle cx='80' cy='80' r='2'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.hero::after{content:'';position:absolute;right:-120px;top:-120px;width:500px;height:500px;border-radius:50%;background:rgba(255,255,255,.07);pointer-events:none}
.hero-orb2{position:absolute;left:-60px;bottom:-100px;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none}
.hero-inner{position:relative;z-index:1;max-width:620px;width:100%}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.85);margin-bottom:18px;background:rgba(255,255,255,.15);padding:5px 14px;border-radius:99px;backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.2)}
.hero h1{font-family:var(--font-d);font-size:clamp(32px,5.5vw,58px);font-weight:800;line-height:1.08;margin-bottom:16px;letter-spacing:-.03em;text-shadow:0 2px 20px rgba(0,0,0,.15)}
.hero p{font-size:16px;color:rgba(255,255,255,.82);line-height:1.75;margin-bottom:32px;max-width:460px;font-weight:400}
.hero-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hero-cta{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--cta);color:#fff;border-radius:var(--r);font-weight:700;font-size:15px;cursor:pointer;border:none;font-family:var(--font-b);transition:all .22s;box-shadow:0 4px 20px rgba(255,105,0,.45);white-space:nowrap}
.hero-cta:hover{background:var(--cta-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,105,0,.55)}
.hero-cta svg{width:15px;height:15px;transition:transform .2s;flex-shrink:0}
.hero-cta:hover svg{transform:translateX(3px)}
.hero-secondary{display:inline-flex;align-items:center;gap:6px;padding:13px 22px;background:rgba(255,255,255,.15);color:#fff;border-radius:var(--r);font-weight:600;font-size:14px;cursor:pointer;border:1px solid rgba(255,255,255,.3);font-family:var(--font-b);transition:all .22s;backdrop-filter:blur(6px);white-space:nowrap}
.hero-secondary:hover{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.5)}
.hero-stats{display:flex;gap:28px;margin-top:36px;padding-top:28px;border-top:1px solid rgba(255,255,255,.2);flex-wrap:wrap}
.hero-stat-val{font-family:var(--font-d);font-size:22px;font-weight:800;line-height:1;margin-bottom:3px}
.hero-stat-lbl{font-size:11px;color:rgba(255,255,255,.65);font-weight:500;letter-spacing:.04em}
.hero-logo{width:68px;height:68px;border-radius:12px;object-fit:cover;margin-bottom:22px;display:block;box-shadow:0 6px 24px rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.35)}
.banner-mayorista{background:#fff7e6;border-bottom:1px solid #ffd591;padding:12px max(16px,calc((100vw - 1200px)/2));display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.bm-left{display:flex;align-items:center;gap:10px}
.bm-icon{width:34px;height:34px;border-radius:8px;background:var(--warn);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bm-text strong{display:block;font-size:13px;font-weight:600;color:#d46b08}
.bm-text span{font-size:12px;color:#ad6800}
.bm-btn{padding:7px 18px;background:var(--warn);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-b);white-space:nowrap;transition:all .15s}
.bm-btn:hover{background:#d97706}
.gb-text{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px}
.gb-text svg{width:15px;height:15px;flex-shrink:0;color:var(--primary);opacity:.8}
.gb-btns{display:flex;gap:7px}
.gb-login{padding:6px 14px;background:transparent;color:var(--primary);border:1px solid var(--primary);border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all .15s}
.gb-login:hover{background:var(--primary-light)}
.gb-register{padding:7px 16px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all .15s}
.gb-register:hover{background:var(--primary-dark)}
.light-banner{background:linear-gradient(135deg,#e6f7ee 0%,#f0fdf4 100%);border-bottom:1px solid #b7eb8f;padding:12px max(16px,calc((100vw - 1200px)/2));display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.lb-left{display:flex;align-items:center;gap:10px}
.lb-icon{width:34px;height:34px;border-radius:8px;background:var(--success);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.lb-text strong{display:block;font-size:13px;font-weight:600;color:#135200}
.lb-text span{font-size:12px;color:#237804}
.lb-btns{display:flex;gap:7px}
.lb-btn-pdf{padding:7px 16px;background:#fff;color:var(--success);border:1px solid #52c41a;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all .15s}
.lb-btn-pdf:hover{background:#f0fdf4}
.lb-btn-wa{padding:7px 16px;background:#25d366;color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all .15s}
.lb-btn-wa:hover{background:#1db954}
.catalog{padding:16px max(16px,calc((100vw - 1200px)/2)) 48px}
.search-bar-wrap{margin-bottom:14px}
.search-bar-inner{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:10px 14px;transition:border-color .2s,box-shadow .2s}
.search-bar-inner:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.search-ico{color:var(--muted-light);flex-shrink:0;transition:color .2s}
.search-bar-inner:focus-within .search-ico{color:var(--primary)}
.search-input{flex:1;border:none;outline:none;background:transparent;font-size:14px;font-family:var(--font-b);color:var(--text);min-width:0}
.search-input::placeholder{color:var(--muted-light)}
.search-input::-webkit-search-cancel-button{display:none}
.search-clear{background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;padding:3px;border-radius:50%;transition:all .15s;flex-shrink:0}
.search-clear:hover{color:var(--text);background:var(--surface2)}
.search-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.search-chips:empty{display:none}
.search-result-count{font-size:12px;color:var(--muted);margin-top:7px;display:none}
.search-result-count.visible{display:block}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 14px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(26,115,232,.3)}
.chip:hover:not(.on){border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:all .22s;display:flex;flex-direction:column;position:relative}
.pcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--primary)}
.pcard-img{aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden;position:relative;cursor:pointer}
.img-track{display:flex;width:100%;height:100%;transition:transform .35s cubic-bezier(.4,0,.2,1)}
.img-track img{width:100%;height:100%;object-fit:cover;flex-shrink:0;transition:transform .4s}
.pcard:hover .img-track img:first-child{transform:scale(1.04)}
.in-list-badge{position:absolute;top:8px;left:8px;background:var(--success);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:99px;letter-spacing:.04em}
.stock-badge{position:absolute;top:8px;right:8px;background:rgba(217,48,37,.9);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:99px;backdrop-filter:blur(4px)}
.mayorista-tag{position:absolute;top:8px;left:8px;background:var(--warn);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:99px;letter-spacing:.04em;text-transform:uppercase}
.verify-tag{position:absolute;bottom:8px;left:8px;background:rgba(255,105,0,.9);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:99px}
.pcard-body{padding:12px 14px 14px;display:flex;flex-direction:column;flex:1}
.pcard-cat{font-size:10px;font-weight:600;color:var(--primary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.pcard-name{font-family:var(--font-d);font-weight:600;font-size:14px;margin-bottom:4px;line-height:1.3;color:var(--text)}
.pcard-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:10px;flex:1}
.pcard-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:auto}
.price-wrap{display:flex;flex-direction:column;gap:1px}
.price-real{font-family:var(--font-d);font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1}
.price-wholesale{font-size:10px;color:#d46b08;font-weight:600;background:#fff7e6;padding:2px 6px;border-radius:99px;display:inline-flex;align-items:center;gap:2px;border:1px solid #ffd591}
.add-btn{padding:7px 14px;background:var(--cta);color:#fff;border:none;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all .2s;white-space:nowrap;box-shadow:0 2px 6px rgba(255,105,0,.25)}
.add-btn:hover{background:var(--cta-dark);transform:translateY(-1px);box-shadow:0 3px 8px rgba(255,105,0,.35)}
.add-btn.in-cart{background:var(--success-light);color:var(--success);border:1px solid #b7eb8f;box-shadow:none}
.add-btn.in-cart:hover{background:#d9f7be}
.add-btn.in-list{background:var(--success-light);color:var(--success);border:1px solid #b7eb8f;box-shadow:none}
.add-btn.in-list:hover{background:#d9f7be}
.add-btn.guest{background:var(--primary-light);color:var(--primary);border:1px solid #bfdbfe;box-shadow:none}
.add-btn.guest:hover{background:#dbeafe}
.add-btn.verify{background:#fff3ed;color:var(--cta);border:1px solid #ffd6b8;box-shadow:none;font-size:10px}
.add-btn.verify:hover{background:#ffe4cc}
.no-stock{padding:5px 10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted-light);border-radius:var(--r);font-size:10px;font-weight:600}
.fab{position:fixed;bottom:24px;right:24px;z-index:90;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
@media(max-width:600px){.fab{bottom:auto;top:72px;right:12px;z-index:48}}
.fab-label{background:var(--text);color:#fff;font-size:11px;font-weight:600;padding:5px 12px;border-radius:99px;white-space:nowrap;cursor:pointer;transition:background .15s;box-shadow:var(--shadow)}
.fab-label:hover{background:var(--primary)}
.fab-btn{width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(26,115,232,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s}
.fab-btn:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(26,115,232,.5)}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:89;background:#fff;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:20px;padding:10px 20px;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.bottom-bar-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;text-decoration:none}
.bottom-bar-icon:hover{transform:scale(1.12)}
.qr-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.qr-modal-bg.on{display:flex}
.qr-box{background:#fff;border-radius:var(--r-xl);padding:28px;text-align:center;box-shadow:var(--shadow-xl);max-width:300px;width:90%}
.qr-box h3{font-family:var(--font-d);font-size:16px;font-weight:700;margin-bottom:5px;color:var(--text)}
.qr-box p{font-size:11px;color:var(--muted);margin-bottom:16px;word-break:break-all;line-height:1.5}
.qr-box img{width:180px;height:180px;border-radius:8px;border:1px solid var(--border)}
.qr-close{margin-top:16px;padding:8px 24px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-b)}
.co-overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,.4);z-index:100;backdrop-filter:blur(2px)}
.co-overlay.on{display:block}
.drawer{position:fixed;top:0;right:-460px;height:100vh;height:100dvh;width:420px;max-width:100vw;background:var(--surface);z-index:101;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 40px rgba(0,0,0,.12)}
.drawer.on{right:0}
.dw-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface2)}
.dw-title{font-family:var(--font-d);font-size:18px;font-weight:700;color:var(--text)}
.xbtn{width:30px;height:30px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--muted)}
.xbtn:hover{background:var(--border);color:var(--text)}
.cart-list{flex:1;overflow-y:auto;padding:14px 20px;min-height:0}
.ci{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--border-light);align-items:flex-start}
.ci:last-child{border:none}
.ci-img{width:52px;height:52px;border-radius:var(--r);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0;border:1px solid var(--border)}
.ci-img img{width:100%;height:100%;object-fit:cover}
.ci-name{font-size:13px;font-weight:600;margin-bottom:2px;color:var(--text)}
.ci-price{font-size:12px;color:var(--primary);font-weight:600}
.qty{display:flex;align-items:center;gap:6px;margin-top:6px}
.qb{width:22px;height:22px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text-mid)}
.qb:hover{background:var(--primary);border-color:var(--primary);color:#fff}
.qv{font-size:13px;font-weight:600;min-width:18px;text-align:center}
.dw-foot{padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface2)}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.total-lbl{font-size:13px;font-weight:500;color:var(--muted)}
.total-val{font-family:var(--font-d);font-size:24px;font-weight:700;color:var(--text)}

  if (!showStockInStore) return null;
  var s = Number(stock || 0);

  if (s < 5)  return { cls: 'stock-low', text: '⚠️ Últimas ' + s };
