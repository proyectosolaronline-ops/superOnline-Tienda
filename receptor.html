<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>EasyLink · Receptor</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    position: fixed;
    top: 0;
    left: 0;
  }

  /* ═══ TODO OCUPA LA PANTALLA ═══ */
  .viewer {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #000;
    position: relative;
  }

  /* ═══ VIDEO FULLSCREEN ═══ */
  .video-area {
    flex: 1;
    width: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .video-area video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  /* ═══ STATUS ═══ */
  .status-pill {
    position: absolute;
    top: 10px;
    top: max(10px, env(safe-area-inset-top));
    left: 10px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 10;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .sdot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4ade80;
    flex-shrink: 0;
  }
  .sdot.wait { background: #fbbf24; animation: blink 1.2s infinite; }
  .sdot.off { background: #ef4444; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* ═══ CONTROLES ═══ */
  .ctrls {
    position: absolute;
    bottom: 16px;
    bottom: max(16px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  .cbtn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cbtn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

  /* ═══ LOADING ═══ */
  .loading-screen {
    position: absolute;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    gap: 14px;
  }
  .loading-screen.hidden { display: none; }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-msg {
    color: #fff;
    font-size: 13px;
    text-align: center;
    padding: 0 20px;
  }

  /* ═══ TOAST ═══ */
  .toast-err {
    position: absolute;
    bottom: 90px;
    left: 16px;
    right: 16px;
    background: rgba(239,68,68,0.9);
    color: #fff;
    padding: 12px;
    border-radius: 12px;
    font-size: 12px;
    text-align: center;
    z-index: 30;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
  }
  .toast-err.show {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>

<div class="viewer">

  <!-- Video -->
  <div class="video-area" id="videoArea">
    <video id="remoteVideo" autoplay playsinline muted></video>

    <!-- Status -->
    <div class="status-pill" id="statusPill" style="display:none">
      <span class="sdot wait" id="sdot"></span>
      <span id="slabel">Conectando</span>
    </div>

    <!-- Controles -->
    <div class="ctrls" id="ctrls" style="display:none">
      <button class="cbtn" id="btnFS" title="Pantalla completa">⛶</button>
      <button class="cbtn" id="btnReconnect" title="Reconectar">🔄</button>
    </div>

    <!-- Toast error -->
    <div class="toast-err" id="toastErr"></div>
  </div>

  <!-- Loading -->
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div class="load-msg" id="loadMsg">📡 Buscando transmisor...</div>
    <div class="load-msg" id="loadSub" style="font-size:10px;color:rgba(255,255,255,0.4);font-family:monospace;"></div>
  </div>

</div>

<script>
(function(){
  'use strict';

  const hostId = new URLSearchParams(window.location.search).get('host');

  const video = document.getElementById('remoteVideo');
  const statusPill = document.getElementById('statusPill');
  const sdot = document.getElementById('sdot');
  const slabel = document.getElementById('slabel');
  const ctrls = document.getElementById('ctrls');
  const toastErr = document.getElementById('toastErr');
  const loadingScreen = document.getElementById('loadingScreen');
  const loadMsg = document.getElementById('loadMsg');
  const loadSub = document.getElementById('loadSub');

  let peer = null;
  let currentCall = null;
  let errTimer;

  // ═══ TOAST ═══
  function showErr(msg) {
    toastErr.textContent = msg;
    toastErr.classList.add('show');
    clearTimeout(errTimer);
    errTimer = setTimeout(() => toastErr.classList.remove('show'), 3500);
  }

  // ═══ STATUS ═══
  function setStatus(state, label) {
    statusPill.style.display = 'flex';
    sdot.className = 'sdot ' + state;
    slabel.textContent = label;
  }

  function setLoading(msg, sub) {
    loadMsg.textContent = msg;
    loadSub.textContent = sub || '';
    loadingScreen.classList.remove('hidden');
  }

  function hideLoading() {
    loadingScreen.classList.add('hidden');
  }

  // ═══ SI NO HAY ID ═══
  if (!hostId) {
    setLoading('❌ Sin ID de transmisor', 'Usa ?host=ID_PEER');
    showErr('Falta el ID del transmisor');
    return;
  }

  // ═══ FULLSCREEN ═══
  document.getElementById('btnFS').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => video.requestFullscreen().catch(()=>{}));
    } else {
      document.exitFullscreen();
    }
  });

  // ═══ RECONECTAR ═══
  document.getElementById('btnReconnect').addEventListener('click', () => {
    if (currentCall) { currentCall.close(); currentCall = null; }
    if (peer) { peer.destroy(); peer = null; }
    video.srcObject = null;
    ctrls.style.display = 'none';
    setStatus('wait', 'Reconectando');
    setLoading('🔄 Reconectando...', hostId.slice(0,16) + '...');
    setTimeout(connect, 500);
  });

  // ═══ CONECTAR ═══
  function connect() {
    ctrls.style.display = 'flex';
    setStatus('wait', 'Conectando');
    setLoading('📡 Buscando transmisor...', hostId.slice(0,16) + '...');

    peer = new Peer({
      debug: 0,
      config: {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          {
            urls: ['turn:a.relay.metered.ca:80','turn:a.relay.metered.ca:443','turn:a.relay.metered.ca:443?transport=tcp'],
            username: 'open',
            credential: 'open'
          }
        ],
        iceCandidatePoolSize: 8
      }
    });

    peer.on('open', () => {
      setLoading('📞 Llamando...', hostId.slice(0,16) + '...');
      const dc = peer.connect(hostId, { reliable: true });
      dc.on('open', () => {
        setLoading('📡 Esperando video...', '');
        dc.send({ type: 'viewer-hello', name: 'Receptor' });
      });
      dc.on('error', () => {
        showErr('No se pudo contactar al transmisor');
        setStatus('off', 'Host offline');
        setLoading('⚠️ Transmisor no disponible', '¿Iniciaste la demo?');
      });
    });

    peer.on('call', (call) => {
      currentCall = call;
      call.answer();
      setLoading('🎬 Cargando video...', '');

      call.on('stream', (stream) => {
        hideLoading();
        ctrls.style.display = 'flex';
        setStatus('', 'EN VIVO');
        video.srcObject = stream;
        video.play().catch(() => showErr('Toca la pantalla para reproducir'));
      });

      call.on('error', () => {
        showErr('Error en el video');
        hideLoading();
        setStatus('off', 'Error');
      });

      call.on('close', () => {
        video.srcObject = null;
        setStatus('off', 'Finalizado');
        setLoading('⏹ Transmisión terminada', '');
        ctrls.style.display = 'flex';
      });
    });

    peer.on('error', (err) => {
      hideLoading();
      setStatus('off', 'Error');
      if (err.type === 'peer-unavailable') {
        showErr('Transmisor no encontrado');
        setLoading('❌ Host no disponible', hostId.slice(0,16));
      } else {
        showErr('Error: ' + (err.message || err.type));
      }
    });

    peer.on('disconnected', () => {
      setStatus('off', 'Desconectado');
      showErr('Conexión perdida');
      setTimeout(() => { if (peer && !peer.destroyed) peer.reconnect(); }, 2000);
    });
  }

  window.addEventListener('beforeunload', () => {
    if (currentCall) currentCall.close();
    if (peer) peer.destroy();
  });

  connect();
})();
</script>
</body>
</html>
