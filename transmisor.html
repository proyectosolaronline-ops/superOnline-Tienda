<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EasyLink · Transmisor</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,sans-serif;}

/* Tienda ocupa toda la pantalla (solo como referencia visual para el vendedor) */
#store-frame{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  z-index:1;
}

/* Botones flotantes */
#fab{
  position:fixed;
  bottom:24px;
  right:16px;
  z-index:100;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:10px;
}
.fab-btn{
  display:flex;
  align-items:center;
  gap:8px;
  padding:12px 18px;
  border-radius:99px;
  border:none;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  font-family:system-ui,sans-serif;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
  white-space:nowrap;
}
#btnTransmit{background:#2563eb;color:#fff;}
#btnTransmit.live{background:#ef4444;}
#btnWA{background:#16a34a;color:#fff;}
#btnWA:disabled{opacity:0.4;cursor:default;}

/* Badge en vivo */
#liveBadge{
  position:fixed;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  background:#ef4444;
  color:#fff;
  font-size:11px;
  font-weight:700;
  letter-spacing:.08em;
  padding:4px 14px;
  border-radius:99px;
  z-index:100;
  display:none;
  align-items:center;
  gap:6px;
}
#liveBadge.on{display:flex;}
#liveBadge::before{
  content:'';width:7px;height:7px;border-radius:50%;
  background:#fff;animation:blink .8s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Status */
#status{
  position:fixed;
  bottom:12px;
  left:12px;
  background:rgba(0,0,0,0.6);
  color:#fff;
  padding:5px 12px;
  border-radius:99px;
  font-size:11px;
  font-family:monospace;
  z-index:100;
  pointer-events:none;
}
</style>
</head>
<body>

<iframe id="store-frame"
  src="https://proyectosolaronline-ops.github.io/superOnline-Tienda/index.html?backend=https%3A%2F%2Fscript.google.com%2Fmacros%2Fs%2FAKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik%2Fexec&store=store_f2fcc889b992"
  allowfullscreen
></iframe>

<div id="liveBadge">EN VIVO</div>

<div id="fab">
  <button class="fab-btn" id="btnTransmit" onclick="toggleTransmit()">▶ Iniciar Demo</button>
  <button class="fab-btn" id="btnWA" onclick="enviarWA()" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Enviar link
  </button>
</div>

<div id="status">🟡 Iniciando...</div>

<script>
var RECEPTOR_BASE = window.location.origin + window.location.pathname.replace('transmisor.html','') + 'receptor.html';
var WA_NUM = '524424003376';

var peer        = null;
var myPeerID    = '';
var connections = {};
var isLive      = false;
var displayStream = null;  // Stream de pantalla compartida
var clientLink  = '';

function setStatus(msg){ document.getElementById('status').textContent = msg; }

// ── PeerJS init ───────────────────────────────────────────
function initPeer(){
  setStatus('🟡 Conectando...');
  peer = new Peer({
    debug:0,
    config:{
      iceServers:[
        {urls:'stun:stun.l.google.com:19302'},
        {urls:'stun:stun1.l.google.com:19302'},
        {urls:'turn:a.relay.metered.ca:80',username:'open',credential:'open'},
        {urls:'turn:a.relay.metered.ca:443',username:'open',credential:'open'},
        {urls:'turn:a.relay.metered.ca:443?transport=tcp',username:'open',credential:'open'}
      ],
      iceCandidatePoolSize:10
    }
  });

  peer.on('open', function(id){
    myPeerID = id;
    clientLink = RECEPTOR_BASE + '?host=' + encodeURIComponent(id);
    setStatus('🟢 Listo');
  });

  peer.on('connection', function(conn){
    conn.on('data', function(d){
      if(d.type === 'viewer-hello'){
        connections[conn.peer] = conn;
        setStatus('👀 ' + Object.keys(connections).length + ' viewer(s)');
        if(isLive && displayStream) callViewer(conn.peer);
      }
    });
    conn.on('close', function(){
      delete connections[conn.peer];
      setStatus('👀 ' + Object.keys(connections).length + ' viewer(s)');
    });
  });

  peer.on('error', function(e){
    console.warn(e);
    setTimeout(initPeer, 3000);
  });
}

// ── Obtener stream de pantalla (pestaña/ventana) ──────────
async function getDisplayStream() {
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({
      video: true,
      audio: false
    });
    return stream;
  } catch (e) {
    console.error('Permiso denegado o error:', e);
    throw e;
  }
}

// ── Toggle transmisión ────────────────────────────────────
function toggleTransmit(){
  if(!isLive){
    iniciarDemo();
  } else {
    detenerDemo();
  }
}

async function iniciarDemo(){
  if(!myPeerID){ setStatus('⚠️ Espera conexión al servidor'); return; }

  try {
    setStatus('🖥️ Selecciona la pestaña o ventana de la tienda…');
    displayStream = await getDisplayStream();
    isLive = true;
    document.getElementById('btnTransmit').textContent = '⏹ Detener Demo';
    document.getElementById('btnTransmit').classList.add('live');
    document.getElementById('btnWA').disabled = false;
    document.getElementById('liveBadge').classList.add('on');
    setStatus('🔴 En vivo');

    // Llamar a los viewers ya conectados
    Object.keys(connections).forEach(callViewer);

    // Si el usuario detiene la compartición manualmente (ej. botón "Dejar de compartir")
    displayStream.getVideoTracks()[0].addEventListener('ended', () => {
      detenerDemo();
    });
  } catch (e) {
    setStatus('❌ Permiso de pantalla denegado');
  }
}

function detenerDemo(){
  isLive = false;
  if(displayStream) {
    displayStream.getTracks().forEach(t => t.stop());
    displayStream = null;
  }
  document.getElementById('btnTransmit').textContent = '▶ Iniciar Demo';
  document.getElementById('btnTransmit').classList.remove('live');
  document.getElementById('liveBadge').classList.remove('on');
  setStatus('⏹ Demo detenida');
}

function callViewer(viewerId){
  if(!displayStream || !peer) return;
  var call = peer.call(viewerId, displayStream);
  call.on('error', function(e){ console.warn('call error',e); });
}

// ── WhatsApp ──────────────────────────────────────────────
function enviarWA(){
  if(!clientLink){ return; }
  var msg = '🛍️ ¡Mira mi tienda en vivo!\n\nAbre este link:\n' + clientLink;
  window.open('https://wa.me/' + WA_NUM + '?text=' + encodeURIComponent(msg), '_blank');
}

// ── Boot ──────────────────────────────────────────────────
initPeer();
</script>
</body>
</html>
