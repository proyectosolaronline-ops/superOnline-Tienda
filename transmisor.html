<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>EasyLink · Transmisor + Tienda</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    position: fixed;
    top: 0;
    left: 0;
  }

  /* ── Contenedor principal ── */
  .app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Barra superior ── */
  .top-bar {
    background: #111;
    padding: 10px 16px;
    padding-top: max(10px, env(safe-area-inset-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
    z-index: 10;
  }

  .peer-id-box {
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 6px 12px;
    font-family: monospace;
    font-size: 12px;
    color: #4ade80;
    font-weight: 600;
    letter-spacing: 1px;
    flex: 1;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fbbf24;
    flex-shrink: 0;
    animation: pulse 1.2s infinite;
  }
  .status-dot.live {
    background: #4ade80;
    animation: none;
  }
  .status-dot.off {
    background: #ef4444;
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  .status-text {
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* ── Área principal: iframe tienda O preview ── */
  .main-area {
    flex: 1;
    width: 100%;
    position: relative;
    background: #000;
    min-height: 0;
  }

  .main-area iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .preview-video {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 120px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.3);
    background: #000;
    z-index: 5;
    display: none;
  }
  .preview-video.show {
    display: block;
  }
  .preview-video video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ── Barra inferior con botones ── */
  .bottom-bar {
    background: #111;
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
    z-index: 10;
  }

  .btn {
    flex: 1;
    padding: 14px 12px;
    border-radius: 12px;
    border: none;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn:active {
    transform: scale(0.96);
  }

  .btn-start {
    background: #4ade80;
    color: #000;
  }
  .btn-start.stop {
    background: #ef4444;
    color: #fff;
  }

  .btn-share {
    background: #1a1a1a;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .btn-share:disabled {
    opacity: 0.4;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    background: rgba(0,0,0,0.9);
    color: #fff;
    padding: 14px 22px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 600;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s ease;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
  }

  /* ── Overlay compartir ── */
  .share-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 20px;
  }
  .share-overlay.open {
    display: flex;
  }

  .share-card {
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    width: 100%;
    max-width: 320px;
  }

  .share-id {
    font-family: monospace;
    font-size: 28px;
    font-weight: 800;
    color: #4ade80;
    letter-spacing: 2px;
    margin: 10px 0;
    word-break: break-all;
  }

  .share-url {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    word-break: break-all;
    margin-bottom: 16px;
    padding: 8px;
    background: #0a0a0a;
    border-radius: 8px;
    font-family: monospace;
  }

  .share-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn-copy {
    padding: 12px;
    background: #4ade80;
    color: #000;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .btn-close-share {
    padding: 12px;
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="app">

  <!-- Barra superior -->
  <div class="top-bar">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">Conectando...</span>
    <div class="peer-id-box" id="peerIdBox">---</div>
  </div>

  <!-- Área principal: iframe de la tienda -->
  <div class="main-area" id="mainArea">
    <iframe id="storeFrame" src="index.html" allowfullscreen></iframe>
    
    <!-- Preview de lo que se transmite -->
    <div class="preview-video" id="previewWrap">
      <video id="previewVideo" autoplay playsinline muted></video>
    </div>
  </div>

  <!-- Barra inferior con botones -->
  <div class="bottom-bar">
    <button class="btn btn-start" id="btnStart" disabled>
      📺 Iniciar transmisión
    </button>
    <button class="btn btn-share" id="btnShare" disabled>
      🔗 Compartir
    </button>
  </div>

  <!-- Overlay compartir -->
  <div class="share-overlay" id="shareOverlay">
    <div class="share-card">
      <div style="font-size:32px;margin-bottom:8px">📡</div>
      <div style="color:#fff;font-size:14px;font-weight:600;margin-bottom:4px">Comparte este ID con el receptor:</div>
      <div class="share-id" id="sharePeerId">---</div>
      <div style="color:rgba(255,255,255,0.4);font-size:11px;margin-bottom:10px">O envía el enlace completo:</div>
      <div class="share-url" id="shareUrl"></div>
      <div class="share-actions">
        <button class="btn-copy" id="btnCopyLink">📋 Copiar enlace completo</button>
        <button class="btn-copy" id="btnCopyId" style="background:#1a1a1a;color:#4ade80;border:1px solid #4ade80;">📋 Copiar solo ID</button>
        <button class="btn-close-share" id="btnCloseShare">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

</div>

<script>
(function(){
  'use strict';

  // ── DOM ──
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const peerIdBox = document.getElementById('peerIdBox');
  const btnStart = document.getElementById('btnStart');
  const btnShare = document.getElementById('btnShare');
  const mainArea = document.getElementById('mainArea');
  const storeFrame = document.getElementById('storeFrame');
  const previewWrap = document.getElementById('previewWrap');
  const previewVideo = document.getElementById('previewVideo');
  const shareOverlay = document.getElementById('shareOverlay');
  const sharePeerId = document.getElementById('sharePeerId');
  const shareUrl = document.getElementById('shareUrl');
  const toast = document.getElementById('toast');

  let peer = null;
  let peerId = null;
  let streamActive = false;
  let screenStream = null;

  // ── Toast ──
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ── Status ──
  function setStatus(state, text) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = text;
  }

  // ── Inicializar PeerJS ──
  function initPeer() {
    setStatus('', 'Conectando...');
    peerIdBox.textContent = '...';

    peer = new Peer({
      debug: 0,
      config: {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          { urls: 'stun:stun2.l.google.com:19302' },
          {
            urls: ['turn:a.relay.metered.ca:80','turn:a.relay.metered.ca:443','turn:a.relay.metered.ca:443?transport=tcp'],
            username: 'open',
            credential: 'open'
          }
        ],
        iceCandidatePoolSize: 8
      }
    });

    peer.on('open', (id) => {
      peerId = id;
      peerIdBox.textContent = id;
      setStatus('off', 'Listo');
      btnStart.disabled = false;
      btnShare.disabled = false;
    });

    peer.on('error', (err) => {
      console.error('Peer error:', err);
      setStatus('off', 'Error');
      peerIdBox.textContent = 'Error';
      showToast('Error de conexión');
    });

    // Manejar llamadas entrantes (responder con stream)
    peer.on('call', (call) => {
      if (screenStream) {
        call.answer(screenStream);
      } else {
        call.close();
      }
    });
  }

  // ── Iniciar transmisión de pantalla ──
  async function startScreenShare() {
    if (streamActive) {
      stopScreenShare();
      return;
    }

    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({
        video: { mediaSource: 'screen' },
        audio: true
      });

      streamActive = true;
      setStatus('live', 'Transmitiendo');
      btnStart.textContent = '⏹ Detener';
      btnStart.classList.add('stop');

      // Mostrar preview
      previewVideo.srcObject = screenStream;
      previewWrap.classList.add('show');

      // Detectar cuando el usuario cierra el share nativo
      screenStream.getVideoTracks()[0].addEventListener('ended', () => {
        stopScreenShare();
      });

      showToast('✅ Transmisión iniciada');

    } catch (err) {
      console.error('Error al compartir:', err);
      showToast('No se pudo compartir pantalla');
    }
  }

  function stopScreenShare() {
    if (screenStream) {
      screenStream.getTracks().forEach(t => t.stop());
      screenStream = null;
    }

    streamActive = false;
    previewVideo.srcObject = null;
    previewWrap.classList.remove('show');
    setStatus('off', 'Listo');
    btnStart.textContent = '📺 Iniciar transmisión';
    btnStart.classList.remove('stop');
    showToast('Transmisión detenida');
  }

  // ── Compartir enlace ──
  function openShareOverlay() {
    if (!peerId) return;

    const receptorURL = window.location.origin + window.location.pathname.replace('transmisor', 'receptor').replace('index.html', 'receptor.html') + '?host=' + peerId;
    
    // Si no encuentra receptor.html, usar una URL genérica
    const finalURL = receptorURL.includes('receptor.html') ? receptorURL : 
      window.location.origin + '/receptor.html?host=' + peerId;

    sharePeerId.textContent = peerId;
    shareUrl.textContent = finalURL;
    shareOverlay.classList.add('open');
  }

  function closeShareOverlay() {
    shareOverlay.classList.remove('open');
  }

  // ── Copiar ──
  document.getElementById('btnCopyLink').addEventListener('click', () => {
    const url = shareUrl.textContent;
    navigator.clipboard.writeText(url).then(() => {
      showToast('✅ Enlace copiado');
      closeShareOverlay();
    });
  });

  document.getElementById('btnCopyId').addEventListener('click', () => {
    navigator.clipboard.writeText(peerId).then(() => {
      showToast('✅ ID copiado');
      closeShareOverlay();
    });
  });

  document.getElementById('btnCloseShare').addEventListener('click', closeShareOverlay);

  // ── Eventos botones ──
  btnStart.addEventListener('click', startScreenShare);
  btnShare.addEventListener('click', openShareOverlay);

  // ── Limpiar ──
  window.addEventListener('beforeunload', () => {
    stopScreenShare();
    if (peer) peer.destroy();
  });

  // ── Iniciar ──
  initPeer();

})();
</script>
</body>
</html>
