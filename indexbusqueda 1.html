 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mi Tienda · Catálogo Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;
    --cta:#ff6900;--cta-dark:#e55c00;
    --success:#00a650;--success-light:#e6f7ee;
    --warn:#f59e0b;
    --danger:#d93025;
    --bg:#f5f6f7;--surface:#fff;--border:#dde1e7;
    --text:#1a1a2e;--text-mid:#4a4a5a;--muted:#717185;
    --font-d:'Outfit',sans-serif;--font-b:'Inter',sans-serif;
    --r:8px;--r-lg:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-b);background:var(--bg);color:var(--text);font-size:14px}
  
  .navbar{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  .brand{font-family:var(--font-d);font-size:20px;font-weight:800;color:var(--primary);display:flex;align-items:center;gap:8px;cursor:pointer}
  .brand-icon{width:32px;height:32px;border-radius:8px;background:var(--primary);display:flex;align-items:center;justify-content:center}
  .brand-icon svg{width:18px;height:18px}
  .cart-pill{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);background:var(--cta);color:#fff;font-size:13px;font-weight:600;cursor:pointer;border:none}
  .cart-pill .n{background:rgba(255,255,255,.25);border-radius:99px;padding:1px 7px;font-size:11px}
  
  .hero{background:var(--primary);color:#fff;padding:40px 16px;text-align:center}
  .hero h1{font-family:var(--font-d);font-size:32px;font-weight:800;margin-bottom:8px}
  .hero p{font-size:14px;opacity:.9}
  
  .search-wrap{padding:0 16px 12px}
  .search-bar{background:var(--surface);border:1px solid var(--border);border-radius:60px;padding:10px 16px;display:flex;align-items:center;gap:8px}
  .search-bar input{flex:1;border:none;outline:none;background:transparent;font-size:14px}
  .search-bar input::placeholder{color:var(--muted)}
  
  .catalog{padding:0 16px 40px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:1024px){.grid{grid-template-columns:repeat(4,1fr)}}
  
  .product-card{background:var(--surface);border-radius:16px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:.2s}
  .product-card:active{transform:scale(.97)}
  .product-img{aspect-ratio:1;background:#f8f9fa;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
  .stock-badge{position:absolute;bottom:8px;left:8px;font-size:10px;background:rgba(0,0,0,.6);color:#fff;padding:3px 8px;border-radius:99px}
  .wholesale-tag{position:absolute;top:8px;left:8px;background:var(--warn);color:#fff;font-size:9px;padding:3px 8px;border-radius:99px}
  .product-info{padding:12px}
  .product-name{font-weight:700;font-size:14px;margin-bottom:4px}
  .product-price{font-weight:800;font-size:16px;color:var(--primary);margin-top:4px}
  .add-btn{width:100%;margin-top:10px;padding:8px;background:var(--cta);color:#fff;border:none;border-radius:40px;font-size:12px;font-weight:600;cursor:pointer}
  .add-btn.in-cart{background:var(--success-light);color:var(--success);border:1px solid #b7eb8f}
  
  .cart-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end}
  .cart-modal.open{display:flex}
  .cart-panel{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto}
  .cart-header{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .cart-item{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid #f0f0f0}
  .cart-item-img{width:50px;height:50px;background:#f5f5f5;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px}
  .cart-item-info{flex:1}
  .cart-item-name{font-weight:600;font-size:14px}
  .cart-item-price{font-size:12px;color:var(--primary)}
  .cart-qty{display:flex;align-items:center;gap:8px;margin-top:6px}
  .cart-qty button{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer}
  .cart-footer{padding:16px;border-top:1px solid var(--border)}
  .cart-total-row{display:flex;justify-content:space-between;font-weight:700;margin-bottom:12px}
  .checkout-btn{width:100%;padding:12px;background:var(--cta);color:#fff;border:none;border-radius:40px;font-weight:600;cursor:pointer}
  
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:8px 20px;border-radius:99px;font-size:12px;z-index:300;display:none}
  footer{text-align:center;padding:20px;font-size:11px;color:var(--muted);background:#fff;margin-top:20px}

  /* CAMBIO 8 - Estilos toggle stock */
  .stock-toggle-wrap{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px}
  .stock-toggle-label{font-size:13px;font-weight:600;color:var(--text)}
  .stock-toggle-sub{font-size:11px;color:var(--muted);margin-top:1px}
  .toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0}
  .toggle-switch input{opacity:0;width:0;height:0}
  .toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:22px;cursor:pointer;transition:.2s}
  .toggle-slider::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;bottom:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle-switch input:checked + .toggle-slider{background:var(--primary)}
  .toggle-switch input:checked + .toggle-slider::before{transform:translateX(18px)}
  .store-stock{font-size:10px;font-weight:600;display:inline-block;padding:2px 7px;border-radius:99px;margin-top:3px}
  .stock-ok{background:#dcfce7;color:#166534}
  .stock-low{background:#fef9c3;color:#854d0e}
  .stock-out{background:#fee2e2;color:#991b1b}
</style>
</head>
<body>

<nav class="navbar">
  <div class="brand" onclick="location.reload()">
    <div class="brand-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></div>
    <span id="store-name">Mi Tienda</span>
  </div>
  <button class="cart-pill" onclick="openCart()">🛒 <span class="n" id="cart-count">0</span></button>
</nav>

<div class="hero">
  <h1 id="hero-title">¡Bienvenido!</h1>
  <p id="hero-desc">Explora nuestro catálogo y haz tu pedido fácilmente</p>
</div>

<div class="search-wrap">
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="search-input" placeholder="Buscar productos..." oninput="filterProducts()">
  </div>
</div>

<section class="catalog">
  <!-- CAMBIO 7 - Toggle stock visible para el dueño -->
  <div class="stock-toggle-wrap">
    <div>
      <div class="stock-toggle-label">Mostrar disponibilidad</div>
      <div class="stock-toggle-sub">Badge de stock en cada producto</div>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" id="stockToggleGlobal" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="grid" id="products-grid"></div>
</section>

<div class="cart-modal" id="cart-modal" onclick="if(event.target===this)closeCart()">
  <div class="cart-panel">
    <div class="cart-header">
      <span style="font-weight:700; font-size:18px">🛒 Tus solicitudes</span>
      <button onclick="closeCart()" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button>
    </div>
    <div id="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total-row">
        <span>Total estimado</span>
        <span id="cart-total">$0.00</span>
      </div>
      <button class="checkout-btn" onclick="sendOrderViaWhatsApp()">📱 Enviar pedido por WhatsApp</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<footer>
  <p>🛍️ Tienda online · Pedidos por WhatsApp · <span id="footer-store-name">Mi Tienda</span></p>
</footer>

<script>
  // ============================================================
  // CONFIGURACIÓN
  // ============================================================
  var params = new URLSearchParams(location.search);
  var BACKEND = params.get('backend') || window.LK_BACKEND || 'https://script.google.com/macros/s/AKfycbwQ_ESx2c-3DL83b_-ujjmvevSBGtwjPZ0e1wEHv3cnLbJOplTJDYUb_UiRVyTYXik/exec';
  var STORE_ID = params.get('store') || window.LK_STORE || localStorage.getItem('ld_store') || '';
  
  // CAMBIO 1 - Token de admin
  var TOKEN_ADMIN = localStorage.getItem('ld_token') || '';
  
  var products = [];
  var cart = [];
  var lightList = [];
  var customer = null;
  var currency = 'MXN';
  var activeCat = '';
  var storeWA = '';
  var storeName = 'Mi Tienda';
  var PLAN_FEATURES = { catalogOnly: true };
  
  // CAMBIO 2 - Variable global stock
  var showStockInStore = true;
  
  var _orderInFlight = false;

  // ============================================================
  // CAMBIO 3 - Funciones de stock
  // ============================================================
  function initStockToggle() {
    var saved = localStorage.getItem('ld_show_stock_store');
    showStockInStore = saved !== null ? saved === 'true' : true;
    var cb = document.getElementById('stockToggleGlobal');
    if (!cb) return;
    cb.checked = showStockInStore;
    cb.addEventListener('change', function(e) {
      showStockInStore = e.target.checked;
      localStorage.setItem('ld_show_stock_store', String(showStockInStore));
      renderGrid();
    });
  }
  
  function getStockDisplay(stock) {
    if (!showStockInStore) return null;
    var s = Number(stock || 0);
    if (s <= 0) return { cls: 'stock-out', text: '❌ Agotado' };
    if (s < 5)  return { cls: 'stock-low', text: '⚠️ Últimas ' + s };
    return      { cls: 'stock-ok',  text: '📦 Stock: ' + s };
  }

  // ============================================================
  // API
  // ============================================================
  async function getWithToken(a, token) {
    try {
      var url = BACKEND + '?action=' + a + '&storeId=' + STORE_ID;
      if (token) url += '&token=' + encodeURIComponent(token);
      var r = await fetch(url);
      var text = await r.text();
      if (text.trim().startsWith('<')) return null;
      var d = JSON.parse(text);
      return d.ok ? d : null;
    } catch(e) { return null; }
  }

  // ============================================================
  // CARGA DE PRODUCTOS
  // ============================================================
  function loadCachedCatalog() {
    try {
      var raw = localStorage.getItem('cache_catalog_' + STORE_ID);
      if (!raw) return null;
      var data = JSON.parse(raw);
      if (!data || !data.products || !data.products.length) return null;
      return { products: data.products, cachedAt: data.cachedAt || 0 };
    } catch(e) { return null; }
  }
  
  function saveCachedCatalog(data) {
    try {
      localStorage.setItem('cache_catalog_' + STORE_ID, JSON.stringify({ products: data, cachedAt: Date.now() }));
      return true;
    } catch(e) { return false; }
  }

  async function loadProducts() {
    // CAMBIO 5 - Priorizar product.list con token de admin
    if (TOKEN_ADMIN) {
      try {
        var adminRes = await fetch(BACKEND, {
          method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'product.list', storeId: STORE_ID, token: TOKEN_ADMIN })
        });
        var adminData = await adminRes.json();
        if (adminData && adminData.products && adminData.products.length) {
          products = adminData.products.filter(function(p) { return p.active === true || p.active === 'TRUE'; });
          if (products.length > 0) saveCachedCatalog(products);
          renderGrid();
          return;
        }
      } catch(e) { console.warn('Fallback product.list falló:', e); }
    }
    
    // Fallback a store.catalog
    var cR = await getWithToken('store.catalog', '');
    if (cR && cR.products) {
      products = cR.products.filter(function(p) { return p.active === true || p.active === 'TRUE'; });
      if (products.length > 0) saveCachedCatalog(products);
    } else {
      var cached = loadCachedCatalog();
      if (cached && cached.products && cached.products.length) {
        products = cached.products;
        toast('Mostrando catálogo guardado');
      }
    }
    renderGrid();
  }

  // ============================================================
  // RENDER
  // ============================================================
  function renderGrid() {
    var g = document.getElementById('products-grid');
    if (!g) return;
    
    var activeProducts = products.filter(function(p) { return p.active === true || p.active === 'TRUE'; });
    
    if (!activeProducts.length) {
      g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px">🛍️ No hay productos disponibles<br><span style="font-size:12px">Pronto agregaremos más novedades</span></div>';
      return;
    }
    
    g.innerHTML = activeProducts.map(function(p) {
      var price = Number(p.price || 0);
      var hasWholesale = p.wholesalePrice !== undefined && p.wholesalePrice !== '' && p.wholesalePrice !== null;
      var inCart = cart.find(function(c) { return c.productId === p.productId; });
      var cartQty = inCart ? inCart.qty : 0;
      
      // CAMBIO 6 - Stock badge
      var si = getStockDisplay(p.stock);
      var stockBadgeHTML = si ? '<span class="store-stock ' + si.cls + '">' + si.text + '</span>' : '';
      
      var priceHTML = '<div class="price-wrap">' +
        '<span class="price-real">' + formatPrice(price) + '</span>' +
        (hasWholesale ? '<span class="price-wholesale">⭐ May: ' + formatPrice(p.wholesalePrice) + '</span>' : '') +
        stockBadgeHTML +
        '</div>';
      
      return '<div class="product-card" onclick="openProductDetail(\'' + p.productId + '\')">' +
        '<div class="product-img">' +
          (p.imageUrl ? '<img src="' + fixImgUrl(p.imageUrl) + '" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display=\'none\'">' : '🛍️') +
          (hasWholesale ? '<div class="wholesale-tag">⭐ Mayorista</div>' : '') +
        '</div>' +
        '<div class="product-info">' +
          '<div class="product-name">' + escapeHtml(p.name) + '</div>' +
          '<div class="product-category" style="font-size:11px; color:#717185;">' + (p.category || '') + '</div>' +
          '<div class="product-price">' + formatPrice(price) + '</div>' +
          (hasWholesale ? '<div style="font-size:10px; background:#fff7e6; padding:2px 6px; border-radius:99px; display:inline-block; margin-top:4px;">⭐ Mayorista: ' + formatPrice(p.wholesalePrice) + '</div>' : '') +
          '<button class="add-btn ' + (cartQty > 0 ? 'in-cart' : '') + '" onclick="event.stopPropagation(); addToCart(\'' + p.productId + '\')">' +
            (cartQty > 0 ? '✓ ' + cartQty + ' en solicitud' : '+ Solicitar') +
          '</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }
  
  function formatPrice(n) {
    return new Intl.NumberFormat('es-MX', { style: 'currency', currency: currency || 'MXN' }).format(Number(n || 0));
  }
  
  function fixImgUrl(url) {
    if (!url) return '';
    var m = url.match(/[?&]id=([\w-]+)/);
    if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
    var m2 = url.match(/\/d\/([\w-]+)/);
    if (m2) return 'https://lh3.googleusercontent.com/d/' + m2[1];
    return url;
  }
  
  function escapeHtml(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  
  function filterProducts() {
    var input = document.getElementById('search-input');
    var query = input ? input.value.toLowerCase() : '';
    var g = document.getElementById('products-grid');
    if (!g) return;
    
    var filtered = products.filter(function(p) {
      if (!(p.active === true || p.active === 'TRUE')) return false;
      if (!query) return true;
      return (p.name || '').toLowerCase().includes(query) || (p.category || '').toLowerCase().includes(query);
    });
    
    if (!filtered.length) {
      g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px">🔍 No se encontraron productos<br><span style="font-size:12px">Prueba con otra búsqueda</span></div>';
      return;
    }
    
    g.innerHTML = filtered.map(function(p) {
      var price = Number(p.price || 0);
      var hasWholesale = p.wholesalePrice !== undefined && p.wholesalePrice !== '' && p.wholesalePrice !== null;
      var inCart = cart.find(function(c) { return c.productId === p.productId; });
      var cartQty = inCart ? inCart.qty : 0;
      var si = getStockDisplay(p.stock);
      var stockBadgeHTML = si ? '<span class="store-stock ' + si.cls + '">' + si.text + '</span>' : '';
      
      return '<div class="product-card" onclick="openProductDetail(\'' + p.productId + '\')">' +
        '<div class="product-img">' +
          (p.imageUrl ? '<img src="' + fixImgUrl(p.imageUrl) + '" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display=\'none\'">' : '🛍️') +
          (hasWholesale ? '<div class="wholesale-tag">⭐ Mayorista</div>' : '') +
        '</div>' +
        '<div class="product-info">' +
          '<div class="product-name">' + escapeHtml(p.name) + '</div>' +
          '<div class="product-category" style="font-size:11px; color:#717185;">' + (p.category || '') + '</div>' +
          '<div class="product-price">' + formatPrice(price) + '</div>' +
          (hasWholesale ? '<div style="font-size:10px; background:#fff7e6; padding:2px 6px; border-radius:99px; display:inline-block; margin-top:4px;">⭐ Mayorista: ' + formatPrice(p.wholesalePrice) + '</div>' : '') +
          stockBadgeHTML +
          '<button class="add-btn ' + (cartQty > 0 ? 'in-cart' : '') + '" onclick="event.stopPropagation(); addToCart(\'' + p.productId + '\')">' +
            (cartQty > 0 ? '✓ ' + cartQty + ' en solicitud' : '+ Solicitar') +
          '</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }
  
  // ============================================================
  // CARRITO
  // ============================================================
  function loadCart() {
    var saved = localStorage.getItem('cart_' + STORE_ID);
    if (saved) {
      try { cart = JSON.parse(saved); } catch(e) { cart = []; }
    }
    updateCartUI();
  }
  
  function saveCart() {
    localStorage.setItem('cart_' + STORE_ID, JSON.stringify(cart));
    updateCartUI();
  }
  
  function addToCart(productId) {
    var product = products.find(function(p) { return p.productId === productId; });
    if (!product) return;
    
    var existing = cart.find(function(c) { return c.productId === productId; });
    if (existing) {
      existing.qty++;
    } else {
      cart.push({
        productId: product.productId,
        name: product.name,
        price: Number(product.price || 0),
        imageUrl: product.imageUrl || '',
        qty: 1
      });
    }
    saveCart();
    toast('✓ "' + product.name + '" agregado a solicitudes');
    renderGrid();
    filterProducts();
  }
  
  function updateCartQty(productId, delta) {
    var index = cart.findIndex(function(c) { return c.productId === productId; });
    if (index === -1) return;
    
    cart[index].qty += delta;
    if (cart[index].qty <= 0) {
      cart.splice(index, 1);
    }
    saveCart();
    renderGrid();
    filterProducts();
    renderCartModal();
  }
  
  function getCartTotal() {
    return cart.reduce(function(sum, c) { return sum + (c.price * c.qty); }, 0);
  }
  
  function getCartCount() {
    return cart.reduce(function(sum, c) { return sum + c.qty; }, 0);
  }
  
  function updateCartUI() {
    var count = getCartCount();
    var countEl = document.getElementById('cart-count');
    if (countEl) countEl.textContent = count;
    
    var total = getCartTotal();
    var totalEl = document.getElementById('cart-total');
    if (totalEl) totalEl.textContent = formatPrice(total);
  }
  
  // ============================================================
  // MODALES
  // ============================================================
  function openProductDetail(productId) {
    var product = products.find(function(p) { return p.productId === productId; });
    if (!product) return;
    
    var inCart = cart.find(function(c) { return c.productId === productId; });
    var cartQty = inCart ? inCart.qty : 0;
    var si = getStockDisplay(product.stock);
    
    var modalHtml = '<div class="cart-modal open" id="detail-modal" onclick="if(event.target===this)closeDetail()">' +
      '<div class="cart-panel" style="max-width:400px; margin:0 auto;">' +
        '<div class="cart-header">' +
          '<span style="font-weight:700; font-size:18px">' + escapeHtml(product.name) + '</span>' +
          '<button onclick="closeDetail()" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button>' +
        '</div>' +
        '<div style="text-align:center; padding:24px;">' +
          '<div style="font-size:80px; margin-bottom:12px;">' + (product.imageUrl ? '<img src="' + fixImgUrl(product.imageUrl) + '" style="width:120px;height:120px;object-fit:cover;border-radius:16px">' : '🛍️') + '</div>' +
          '<div style="font-size:13px; color:#717185; margin-bottom:16px;">' + (product.category || '') + '</div>' +
          '<div style="font-size:28px; font-weight:800; color:var(--primary); margin-bottom:8px;">' + formatPrice(product.price) + '</div>' +
          (product.wholesalePrice ? '<div style="background:#fff7e6; padding:6px 12px; border-radius:99px; display:inline-block; margin-bottom:12px;">⭐ Mayorista: ' + formatPrice(product.wholesalePrice) + '</div>' : '') +
          (si ? '<div style="margin:12px 0; padding:6px 12px; background:' + (si.cls === 'stock-out' ? '#fee2e2' : '#e6f7ee') + '; border-radius:99px; display:inline-block;">' + si.text + '</div>' : '<div style="margin:12px 0; color:#717185;">Disponibilidad consultar</div>') +
          '<button class="add-btn" style="width:100%; padding:12px; margin-top:8px;" onclick="addToCart(\'' + product.productId + '\'); closeDetail();">' +
            (cartQty > 0 ? '✓ ' + cartQty + ' en solicitud' : '+ Agregar a solicitudes') +
          '</button>' +
        '</div>' +
      '</div>' +
    '</div>';
    
    var existing = document.getElementById('detail-modal');
    if (existing) existing.remove();
    
    var div = document.createElement('div');
    div.id = 'detail-modal';
    div.innerHTML = modalHtml;
    document.body.appendChild(div);
  }
  
  function closeDetail() {
    var modal = document.getElementById('detail-modal');
    if (modal) modal.remove();
  }
  
  function openCart() {
    renderCartModal();
    document.getElementById('cart-modal').classList.add('open');
  }
  
  function closeCart() {
    document.getElementById('cart-modal').classList.remove('open');
  }
  
  function renderCartModal() {
    var container = document.getElementById('cart-items');
    if (!container) return;
    
    if (!cart.length) {
      container.innerHTML = '<div class="empty-state">🛒 No hay solicitudes aún<br><span style="font-size:12px">Explora el catálogo y agrega productos</span></div>';
      return;
    }
    
    container.innerHTML = cart.map(function(item) {
      return '<div class="cart-item">' +
        '<div class="cart-item-img">' + (item.imageUrl ? '<img src="' + fixImgUrl(item.imageUrl) + '" style="width:100%;height:100%;object-fit:cover">' : '🛍️') + '</div>' +
        '<div class="cart-item-info">' +
          '<div class="cart-item-name">' + escapeHtml(item.name) + '</div>' +
          '<div class="cart-item-price">' + formatPrice(item.price) + ' c/u</div>' +
          '<div class="cart-qty">' +
            '<button onclick="updateCartQty(\'' + item.productId + '\', -1)">−</button>' +
            '<span style="min-width:24px; text-align:center">' + item.qty + '</span>' +
            '<button onclick="updateCartQty(\'' + item.productId + '\', 1)">+</button>' +
          '</div>' +
        '</div>' +
        '<div style="font-weight:700;">' + formatPrice(item.price * item.qty) + '</div>' +
      '</div>';
    }).join('');
    
    var total = getCartTotal();
    var totalEl = document.getElementById('cart-total');
    if (totalEl) totalEl.textContent = formatPrice(total);
  }
  
  // ============================================================
  // WHATSAPP
  // ============================================================
  function sendOrderViaWhatsApp() {
    if (!cart.length) {
      toast('Agrega productos a tu solicitud primero');
      return;
    }
    
    var phone = storeWA.replace(/\D/g, '');
    if (!phone || phone.length < 8) {
      toast('Esta tienda no tiene WhatsApp configurado');
      return;
    }
    
    var message = '🛍️ *PEDIDO NUEVO - ' + storeName + '*\n\n';
    message += '📋 *Mi lista de productos:*\n';
    cart.forEach(function(item, i) {
      message += (i+1) + '. ' + item.name + ' x' + item.qty + ' — ' + formatPrice(item.price * item.qty) + '\n';
    });
    message += '\n💰 *Total estimado:* ' + formatPrice(getCartTotal()) + '\n';
    message += '\n📱 Mi número de contacto: *[Escribe aquí tu teléfono]*\n';
    message += '\n📍 Dirección de entrega: *[Escribe tu dirección]*\n';
    message += '\n---\n¡Gracias por tu pedido! Te contactaremos para confirmar disponibilidad.';
    
    window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(message), '_blank');
    toast('📱 Redirigiendo a WhatsApp...');
  }
  
  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    clearTimeout(t._t);
    t._t = setTimeout(function() { t.style.display = 'none'; }, 2500);
  }
  
  // ============================================================
  // INICIALIZACIÓN
  // ============================================================
  window.addEventListener('load', async function() {
    if (!BACKEND || !STORE_ID) {
      document.getElementById('products-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px">⚠️ Configuración incompleta<br><span style="font-size:12px">Falta backend o storeId</span></div>';
      return;
    }
    
    // CAMBIO 4 - Inicializar toggle
    initStockToggle();
    
    // Cargar datos
    loadCart();
    await loadProducts();
    
    // Configurar nombre
    document.getElementById('store-name').textContent = storeName;
    document.getElementById('hero-title').textContent = '¡Bienvenido a ' + storeName + '!';
    document.getElementById('footer-store-name').textContent = storeName;
  });
  
  // Exponer funciones globales
  window.addToCart = addToCart;
  window.updateCartQty = updateCartQty;
  window.openCart = openCart;
  window.closeCart = closeCart;
  window.openProductDetail = openProductDetail;
  window.closeDetail = closeDetail;
  window.filterProducts = filterProducts;
  window.sendOrderViaWhatsApp = sendOrderViaWhatsApp;
</script>
</body>
</html>
